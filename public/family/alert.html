<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareConnect - Critical Alert</title>
<style>
    /* Reset & Base Styles */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        background-color: #f2ebe5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    /* Phone Shell (Removed Black Border) */
    .phone-shell {
        width: 390px;
        height: 844px;
        background-color: #FFF9F5;
        border-radius: 40px; /* 稍微调小了一点圆角，没有粗边框时看起来更自然 */
        /* 删除了原有的 border: 14px solid #222; */
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    /* Dynamic Island & Status Bar */
    .status-bar {
        position: absolute;
        top: 0;
        width: 100%;
        height: 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 25px;
        color: white;
        z-index: 10;
        font-size: 14px;
        font-weight: 600;
    }

    .dynamic-island {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 30px;
        background-color: #000;
        border-radius: 20px;
    }

    .status-right {
        display: flex;
        gap: 5px;
        align-items: center;
    }

    /* Red Alert Banner */
    .alert-header {
        background: linear-gradient(180deg, #F84E4E 0%, #F04242 100%);
        color: white;
        padding: 60px 24px 30px 24px;
        border-bottom-left-radius: 32px;
        border-bottom-right-radius: 32px;
        box-shadow: 0 10px 20px rgba(248, 78, 78, 0.2);
    }

    .alert-top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1px;
    }

    .alert-badge {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .dot {
        width: 8px;
        height: 8px;
        background-color: white;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.4; }
        100% { opacity: 1; }
    }

    .close-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
    }
    
    .close-btn:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .alert-title-row {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .alert-icon-wrapper {
        width: 60px;
        height: 60px;
        background-color: rgba(255, 255, 255, 0.25);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .alert-icon-wrapper svg {
        width: 30px;
        height: 30px;
        fill: white;
    }

    .alert-text h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 4px;
    }

    .alert-text p {
        font-size: 15px;
        opacity: 0.9;
    }

    /* Content Area */
    .content-area {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    /* Cards */
    .card {
        background-color: white;
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }

    .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
    }

    .info-row:first-child {
        border-bottom: 1px solid #F0EBE6;
    }

    .info-label {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #8C8681;
        font-size: 15px;
    }

    .info-label svg {
        width: 18px;
        height: 18px;
        stroke: #F84E4E;
        stroke-width: 2;
        fill: none;
    }

    .info-label.green svg { stroke: #38A184; }

    .info-value {
        font-weight: 700;
        font-size: 16px;
        color: #1E293B;
    }

    .info-value.green {
        color: #38A184;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    /* Community Notified Card */
    .community-card {
        background-color: #E6F3EE;
        border-radius: 24px;
        padding: 20px;
        color: #245A4A;
    }

    .card-header {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    .card-header svg {
        width: 16px;
        height: 16px;
        fill: #38A184;
    }

    .community-card p {
        font-size: 15px;
        line-height: 1.5;
    }

    /* Instruction Card */
    .instruction-card {
        background-color: #FDECEC;
        border-radius: 24px;
        padding: 20px;
        color: #8A3A3A;
    }

    .instruction-card .card-header svg {
        fill: #F84E4E;
    }

    .instruction-card p {
        font-size: 15px;
        line-height: 1.5;
    }

    /* Bottom Action Area */
    .action-footer {
        padding: 10px 24px 30px;
        background-color: #FFF9F5;
    }

    .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }

    .btn-action {
        border: none;
        border-radius: 28px;
        padding: 24px 16px;
        color: white;
        font-size: 16px;
        font-weight: 700;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(248, 78, 78, 0.2);
        transition: transform 0.1s, box-shadow 0.1s;
    }
    
    .btn-action:active {
        transform: scale(0.96);
        box-shadow: 0 4px 10px rgba(248, 78, 78, 0.3);
    }

    .btn-community {
        background: #FF6B6B;
    }

    .btn-hospital {
        background: #EE3B3B;
    }

    .btn-action svg {
        width: 28px;
        height: 28px;
        fill: white;
    }

    .countdown {
        text-align: center;
        font-size: 13px;
        color: #9E968F;
        margin-top: 16px;
        font-weight: 500;
    }

    /* Scrollbar Styling for realism */
    .content-area::-webkit-scrollbar {
        width: 6px;
    }
    .content-area::-webkit-scrollbar-thumb {
        background-color: rgba(0,0,0,0.2);
        border-radius: 10px;
    }
</style>
</head>
<body>

<div class="phone-shell">
    <div class="status-bar">
        <span>9:41</span>
        <div class="dynamic-island"></div>
        <div class="status-right">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M1 10h2V8H1v2zm3 0h2V6H4v4zm3 0h2V4H7v6zm3 0h2V2h-2v8zm3 0h2V0h-2v10z"/></svg>
            <svg width="14" height="12" viewBox="0 0 14 12" fill="white"><path d="M7 12a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm0-4.5c-1.3 0-2.5.5-3.4 1.3l1.1 1.2c.6-.6 1.4-1 2.3-1s1.7.4 2.3 1l1.1-1.2c-.9-.8-2.1-1.3-3.4-1.3zm0-3c-2.3 0-4.4.9-6 2.3l1.1 1.2c1.3-1.1 3-1.8 4.9-1.8s3.6.7 4.9 1.8l1.1-1.2c-1.6-1.4-3.7-2.3-6-2.3z"/></svg>

                <span class="dot"></span> CRITICAL ALERT

    <div class="content-area">
