<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareConnect | Family Home</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="app-shell">
    <section class="phone home-screen">
      
      <div class="phone-status" aria-hidden="true">
        <span>9:41</span>
        <div class="status-icons">
          <i></i>
          <i></i>
          <b></b>
        </div>
      </div>

      <div class="home-content">
        <header class="home-header">
          <div>
            <p class="greeting">Good morning</p>
            <h1 id="homeUserName">Sarah Chen</h1>
          </div>
          <button class="avatar-button profile-menu-button" id="logoutButton" type="button" aria-label="Sign out">
            <span id="homeUserInitials">SC</span>
            <strong class="notification-dot" id="homeUnreadAlerts">2</strong>
          </button>
        </header>

        <section class="status-card" aria-label="Current safety status">
          <div class="status-card-top">
            <p id="statusLocation">MOM · LIVING ROOM</p>
            <span class="live-tag">● LIVE</span>
          </div>

          <div class="safe-summary">
            <div class="check-circle" aria-hidden="true">✓</div>
            <div>
              <h2 id="safetyStatus">Safe</h2>
              <p id="safetyMessage">All systems normal</p>
            </div>
          </div>

          <div class="status-pills">
            <span id="cameraStatus">Camera Online</span>
            <span><strong id="batteryLevel">98</strong>% battery</span>
          </div>
        </section>

        <section class="walking-card" aria-label="Walking status">
          <div class="walking-icon" aria-hidden="true">👣</div>
          <div class="walking-copy">
            <h2 id="walkingStatus">Walking</h2>
            <p id="walkingDetail">2 min ago · steady pace</p>
          </div>
          <div class="trend-icon" aria-hidden="true">⌁</div>
        </section>

        <section class="quick-actions" aria-label="Quick actions">
          <div class="section-title-row">
            <h2>Quick Actions</h2>
          </div>

          <div class="action-grid">
            <a class="action-card" href="live-monitor.html">
              <span class="action-icon coral" aria-hidden="true">▶</span>
              <strong>Live View</strong>
              <small>Check camera</small>
            </a>

            <a class="action-card" href="alert.html">
              <span class="action-icon warning" aria-hidden="true">!</span>
              <strong>Alerts</strong>
              <small>Review updates</small>
              <em class="card-badge" id="alertsCardBadge">2</em>
            </a>

            <button class="action-card" type="button" data-demo-message="Health summary is a visual placeholder for a later member task.">
              <span class="action-icon sage" aria-hidden="true">♥</span>
              <strong>Health</strong>
              <small>Vitals summary</small>
            </button>

            <a class="action-card" href="settings.html" data-page-link data-fallback-message="Settings page will be implemented by Member C.">
              <span class="action-icon navy" aria-hidden="true">⚙</span>
              <strong>Settings / Me</strong>
              <small>Family profile</small>
            </a>
          </div>
        </section>
      </div>

      <nav class="bottom-nav" aria-label="Family app navigation">
        <a class="active" href="home.html" aria-current="page">
          <span aria-hidden="true">⌂</span>
          Home
        </a>
        <a href="live-monitor.html">
          <span aria-hidden="true">▶</span>
          Live
        </a>
        <a href="alert.html">
          <span aria-hidden="true">!</span>
          Alerts
        </a>
        <a href="settings.html">
          <span aria-hidden="true">◉</span>
          Me
        </a>
      </nav>

      <div class="toast" id="appToast" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/family.js"></script>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
