<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareConnect | Family Login</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="app-shell">
    <section class="phone login-screen login-phone">
      <div class="phone-status" aria-hidden="true">
        <span>9:41</span>
        <div class="status-icons">
          <i></i>
          <i></i>
          <b></b>
        </div>
      </div>

      <div class="login-content">
        <div class="login-brand">
          <div class="brand-logo" aria-hidden="true">
            <span class="brand-heart">♥</span>
            <span class="verified-badge">✓</span>
          </div>
          <h1>CareConnect</h1>
          <p>Care, connected.</p>

          <div class="auth-mode-switch" aria-label="Authentication mode">
            <button class="auth-mode-button active" type="button" data-auth-mode="signin">Sign In</button>
            <button class="auth-mode-button" type="button" data-auth-mode="signup">Sign Up</button>
          </div>
        </div>

        <form class="login-form" id="familyLoginForm" novalidate>
          <label class="input-pill" for="email">
            <span class="input-icon" aria-hidden="true">✉</span>
            <input id="email" name="email" type="email" placeholder="sarah@email.com" autocomplete="email">
          </label>

          <label class="input-pill" for="password">
            <span class="input-icon" aria-hidden="true">🔒</span>
            <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password">
          </label>

          <button class="primary-button" type="submit">Sign In</button>

          <div class="login-links">
            <p>New here? <a href="#" id="switchToSignupLink">Sign Up</a></p>
            <button class="secondary-text-button" id="forgotPasswordButton" type="button">Forgot password?</button>
          </div>
        </form>

        <form class="login-form auth-extra-fields hidden" id="familySignupForm" novalidate>
          <label class="input-pill" for="fullName">
            <span class="input-icon" aria-hidden="true">👤</span>
            <input id="fullName" name="fullName" type="text" placeholder="Full name" autocomplete="name">
          </label>

          <label class="input-pill" for="signupEmail">
            <span class="input-icon" aria-hidden="true">✉</span>
            <input id="signupEmail" name="signupEmail" type="email" placeholder="sarah@email.com" autocomplete="email">
          </label>

          <label class="input-pill" for="signupPassword">
            <span class="input-icon" aria-hidden="true">🔒</span>
            <input id="signupPassword" name="signupPassword" type="password" placeholder="Password" autocomplete="new-password">
          </label>

          <label class="input-pill" for="confirmPassword">
            <span class="input-icon" aria-hidden="true">✓</span>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm password" autocomplete="new-password">
          </label>

          <button class="primary-button" type="submit">Create Account</button>

          <div class="login-links single-link">
            <p>Already have an account? <a href="#" id="switchToSigninLink">Sign In</a></p>
          </div>
        </form>

        <p class="form-message info" id="authMessage" role="status" aria-live="polite"></p>

        <div class="divider" aria-hidden="true">
          <span></span>
          <strong>OR</strong>
          <span></span>
        </div>

        <button class="phone-login-button" type="button" data-demo-message="Phone number login is for UI demo only.">
          Login with Phone Number
        </button>
      </div>

      <div class="toast" id="appToast" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/family.js"></script>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
